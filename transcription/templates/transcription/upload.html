{% extends 'transcription/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-5">
            <h2 class="text-center mb-4">Upload Audio</h2>
            <p class="text-muted text-center">Select a .wav file to extract musical notes using AI.</p>
            
            <form method="post" enctype="multipart/form-data" class="mt-4">
                {% csrf_token %}
                <div class="mb-4">
                    {{ form.as_p }}
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Start AI Transcription</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
